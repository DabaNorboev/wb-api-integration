services:
  wb_php:
    container_name: wb_php
    build:
      context: ./docker/php
      args:
        USER_ID: ${HOST_UID:-1000}
        GROUP_ID: ${HOST_GID:-1000}
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    environment:
      - TZ=Europe/Moscow
    ports:
      - 9000:9000
    depends_on:
      - wb_mysql
    networks:
      - app-network

  wb_scheduler:
    container_name: wb_scheduler
    build:
      context: ./docker/php
      args:
        USER_ID: ${HOST_UID:-1000}
        GROUP_ID: ${HOST_GID:-1000}
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    environment:
      - TZ=Europe/Moscow
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    depends_on:
      - wb_mysql
    networks:
      - app-network

  wb_mysql:
    container_name: wb_mysql
    image: mysql:8.0
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - TZ=Europe/Moscow
    ports:
      - 9999:3306
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
